name: Claude Code Review

# Automated code review on every PR, via the official claude-code-action.
# Needs the CLAUDE_CODE_OAUTH_TOKEN repo secret (generate one with
# `claude setup-token`, then `gh secret set CLAUDE_CODE_OAUTH_TOKEN`).
# If the secret is missing the job skips with a notice instead of failing,
# so the kit can be installed before the secret exists.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - name: Check for review token
        id: token
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN secret is not set; skipping automated review. Generate one with 'claude setup-token' and add it with 'gh secret set CLAUDE_CODE_OAUTH_TOKEN'."
          fi

      - name: Checkout repository
        if: steps.token.outputs.present == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        if: steps.token.outputs.present == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'

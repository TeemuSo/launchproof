name: Bug
description: Something is broken
labels: ["bug"]
body:
  - type: textarea
    id: expected
    attributes:
      label: Expected
      description: What should happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual
      description: What happens instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Smallest sequence that shows the bug. Include the branch or URL it was seen on.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, logs, failing run links. Optional but strongly preferred.
    validations:
      required: false
